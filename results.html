<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>776 Leadership Results</title>
  <style>
    :root{
      --panel: rgba(10, 12, 26, .72);
      --stroke: rgba(120, 140, 255, .22);
      --text:#eaf0ff;
      --muted:#aab3d6;
      --danger:#ff4b7a;
      --ok:#42ffb0;
    }
    *{box-sizing:border-box;font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;}
    body{
      margin:0; padding:24px;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(55,215,255,.18), transparent 55%),
        radial-gradient(900px 600px at 80% 20%, rgba(255,75,216,.18), transparent 60%),
        radial-gradient(800px 600px at 55% 85%, rgba(120,90,255,.14), transparent 60%),
        linear-gradient(180deg, #050510, #070812 35%, #050510);
      min-height:100vh;
    }
    .wrap{max-width:1400px;margin:0 auto;}
    .topBar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }
    .topBar img{
      width:64px;height:64px;border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(6,7,18,.55);
      object-fit:contain;
      box-shadow: 0 0 0 1px rgba(0,0,0,.35), 0 0 20px rgba(55,215,255,.12);
    }
    h1{margin:0;font-size:20px;font-weight:900;letter-spacing:.4px;}
    h2{margin:0 0 10px;font-size:13px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
    .sub{margin:4px 0 0;color:var(--muted);font-size:13px;}
    label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px;}
    input, select{
      padding:12px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(6, 7, 18, .65);
      color:var(--text);
      outline:none;
    }
    input{width:100%;}
    input:focus, select:focus{
      border-color: rgba(55,215,255,.35);
      box-shadow: 0 0 0 3px rgba(55,215,255,.12);
    }
    .btn{
      border:0; cursor:pointer;
      padding:12px 14px;border-radius:14px;
      color:#07101a;
      background: linear-gradient(90deg, rgba(55,215,255,.95), rgba(255,75,216,.95));
      font-weight:900;
      letter-spacing:.4px;
      width:100%;
    }
    .smallBtn{
      border:1px solid rgba(255,255,255,.14);
      background: rgba(6,7,18,.35);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }
    .msg{margin-top:12px;font-size:13px;}
    .err{color:var(--danger);}
    .ok{color:var(--ok);}
    .hdrRow{
      display:flex;justify-content:space-between;align-items:center;
      gap:12px;margin-bottom:14px;flex-wrap:wrap;
    }
    .btnRow{display:flex;gap:10px;flex-wrap:wrap;}

    .statsBlock{margin-bottom:12px;}
    .pillRow{display:flex;gap:6px;flex-wrap:wrap;}
    .pill{
      padding:6px 10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(6,7,18,.45);
      min-width:60px;
    }
    .pill .pLabel{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
    .pill .pValue{font-size:14px;font-weight:900;margin-top:1px;}

    .iconBtn{
      border:1px solid rgba(255,255,255,.14);
      background: rgba(6,7,18,.45);
      color: var(--text);
      border-radius: 10px;
      width:40px; height:40px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      flex-shrink:0;
    }
    .iconBtn:hover{background: rgba(6,7,18,.7); border-color: rgba(255,255,255,.25);}
    .iconBtn svg{width:18px;height:18px;}

    .filterBar{
      display:flex;align-items:center;gap:12px;
      margin-bottom:14px;flex-wrap:wrap;
    }
    .filterBar label{margin:0;white-space:nowrap;}
    .filterBar select{min-width:180px;}

    #resultsTable{width:100%;border-collapse:collapse;font-size:13px;}
    #resultsTable th{
      text-align:left;
      padding:8px 10px;
      border-bottom:1px solid rgba(255,255,255,.14);
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.4px;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    #resultsTable th:hover{color:var(--text);}
    #resultsTable td{
      padding:8px 10px;
      border-bottom:1px solid rgba(255,255,255,.08);
      white-space:nowrap;
    }
    #resultsTable tr:hover td{background:rgba(255,255,255,.03);}
    .sortArrow{font-size:10px;color:var(--muted);margin-left:4px;}
    .loginBox{max-width:380px;margin:0 auto;}
    .loginBox .field{margin-bottom:14px;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topBar">
      <a href="index.html" title="Back to survey">
        <img src="/assets/logo.png" alt="776 logo">
      </a>
      <button id="logoutBtnTop" class="smallBtn" type="button" onclick="doLogout()" style="display:none;">Log out</button>
    </div>

    <div id="loginSection">
      <div class="loginBox">
        <h1 style="text-align:center;">Leadership Login</h1>
        <div class="sub" style="text-align:center;margin-bottom:20px;">For alliance leadership only. Ask an R4 for an account.</div>

        <div class="field">
          <label>Username</label>
          <input id="loginUsername" type="text" placeholder="Leadership username" autocomplete="username">
        </div>
        <div class="field">
          <label>Password</label>
          <input id="loginPassword" type="password" placeholder="Password" autocomplete="current-password">
        </div>
        <button id="loginSubmitBtn" class="btn" type="button" onclick="doLogin()">Log in</button>
        <div class="msg" id="loginMsg"></div>
      </div>
    </div>

    <div id="resultsSection" style="display:none;">
      <div class="hdrRow">
        <div>
          <h1>776 Transfer Survey Results</h1>
          <div class="sub" id="resultsSub"></div>
        </div>
      </div>

      <div class="statsBlock">
        <h2>By seat color</h2>
        <div class="pillRow" id="colorStats"></div>
      </div>

      <div class="statsBlock">
        <h2>By interested alliance</h2>
        <div class="pillRow" id="allianceStats"></div>
      </div>

      <div class="filterBar">
        <label for="allianceFilter">Filter by alliance:</label>
        <select id="allianceFilter" onchange="onAllianceFilterChange()"></select>
        <button class="iconBtn" type="button" onclick="exportCsv()" title="Export CSV" aria-label="Export CSV">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12"></path>
            <path d="M7 10l5 5 5-5"></path>
            <path d="M5 21h14"></path>
          </svg>
        </button>
      </div>

      <div class="msg" id="resultsMsg"></div>

      <div style="overflow-x:auto; margin-top:10px;">
        <table id="resultsTable">
          <thead id="resultsThead"></thead>
          <tbody id="resultsTbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API_ENDPOINT = "/.netlify/functions/api";
    const SESSION_KEY = "776_leadership_session_v1";

    const HIDDEN_COLUMNS = ["GroupID"];
    const DATE_COLUMNS = ["Timestamp"];
    const SEAT_COLORS = ["Gold", "Purple", "Blue", "White"];

    let allRows = [];
    let visibleColumns = [];
    let sortState = { column: null, dir: 1 };
    let allianceFilter = "All";

    function showMsg(elId, text, ok=false){
      const el = document.getElementById(elId);
      el.textContent = text;
      el.className = "msg " + (ok ? "ok" : "err");
    }

    async function fetchWithTimeout(url, options, ms = 15000) {
      const controller = new AbortController();
      const t = setTimeout(() => controller.abort(), ms);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(t);
      }
    }

    async function api(action, data){
      const res = await fetchWithTimeout(API_ENDPOINT, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ action, ...data })
      });
      const json = await res.json().catch(() => ({}));
      if (!json || json.ok !== true) throw new Error(json.error || "Request failed.");
      return json;
    }

    function getSession(){
      try { return JSON.parse(localStorage.getItem(SESSION_KEY) || "null"); }
      catch(e){ return null; }
    }
    function setSession(session){ localStorage.setItem(SESSION_KEY, JSON.stringify(session)); }
    function clearSession(){ localStorage.removeItem(SESSION_KEY); }

    async function doLogin(){
      showMsg("loginMsg", "");
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value;
      if (!username || !password) return showMsg("loginMsg", "Enter a username and password.");

      const btn = document.getElementById("loginSubmitBtn");
      btn.disabled = true;
      try {
        const res = await api("login", { username, password });
        setSession({ username: res.username, displayName: res.displayName, token: res.token });
        document.getElementById("loginPassword").value = "";
        showResultsSection();
      } catch (e) {
        showMsg("loginMsg", e.message || String(e));
      } finally {
        btn.disabled = false;
      }
    }

    function doLogout(){
      clearSession();
      document.getElementById("resultsSection").style.display = "none";
      document.getElementById("loginSection").style.display = "block";
      document.getElementById("logoutBtnTop").style.display = "none";
      document.getElementById("loginUsername").value = "";
    }

    async function showResultsSection(){
      const session = getSession();
      if (!session) return;

      document.getElementById("loginSection").style.display = "none";
      document.getElementById("resultsSection").style.display = "block";
      document.getElementById("logoutBtnTop").style.display = "inline-block";
      document.getElementById("resultsSub").textContent = `Logged in as ${session.displayName}`;
      showMsg("resultsMsg", "Loading…", true);

      try {
        const res = await api("getResults", { username: session.username, token: session.token });
        loadRows(res.rows || []);
      } catch (e) {
        if (/session expired|not authenticated/i.test(e.message || "")) {
          clearSession();
          showMsg("resultsMsg", "Your session expired. Please log in again.");
          setTimeout(doLogout, 1200);
        } else {
          showMsg("resultsMsg", e.message || String(e));
        }
      }
    }

    function loadRows(rawRows){
      allRows = rawRows;
      visibleColumns = rawRows.length ? Object.keys(rawRows[0]).filter(c => !HIDDEN_COLUMNS.includes(c)) : [];
      sortState = { column: null, dir: 1 };
      allianceFilter = "All";
      populateAllianceFilter();
      renderAll();
    }

    function formatCell(col, value){
      if (value === null || value === undefined || value === "") return "";
      if (DATE_COLUMNS.includes(col)) {
        const d = new Date(value);
        if (!isNaN(d)) return d.toLocaleDateString("en-US", { year: "numeric", month: "short", day: "numeric" });
      }
      return String(value);
    }

    function rowSeatColor(row){
      return row.Role === "Leader" ? row.LeaderSeatColor : row.FriendSeatColor;
    }

    function populateAllianceFilter(){
      const select = document.getElementById("allianceFilter");
      const unique = Array.from(new Set(allRows.map(r => r.InterestedAlliance).filter(Boolean))).sort();
      select.innerHTML = "";
      const allOpt = document.createElement("option");
      allOpt.value = "All";
      allOpt.textContent = "All alliances";
      select.appendChild(allOpt);
      unique.forEach(a => {
        const opt = document.createElement("option");
        opt.value = a;
        opt.textContent = a;
        select.appendChild(opt);
      });
      select.value = "All";
    }

    function onAllianceFilterChange(){
      allianceFilter = document.getElementById("allianceFilter").value;
      renderAll();
    }

    function getFilteredRows(){
      let rows = allRows.slice();
      if (allianceFilter !== "All") {
        rows = rows.filter(r => r.InterestedAlliance === allianceFilter);
      }
      if (sortState.column) {
        const col = sortState.column;
        rows.sort((a, b) => {
          let av = a[col], bv = b[col];
          const an = Number(av), bn = Number(bv);
          let cmp;
          if (av !== "" && bv !== "" && !isNaN(an) && !isNaN(bn)) {
            cmp = an - bn;
          } else if (DATE_COLUMNS.includes(col)) {
            cmp = new Date(av || 0) - new Date(bv || 0);
          } else {
            cmp = String(av ?? "").localeCompare(String(bv ?? ""));
          }
          return cmp * sortState.dir;
        });
      }
      return rows;
    }

    function toggleSort(col){
      if (sortState.column === col) sortState.dir *= -1;
      else { sortState.column = col; sortState.dir = 1; }
      renderAll();
    }

    function renderAll(){
      const rows = getFilteredRows();
      renderStats(rows);
      renderTable(rows);
      showMsg("resultsMsg", `${rows.length} of ${allRows.length} response row(s) shown.`, true);
    }

    function renderStats(rows){
      const colorCounts = {};
      SEAT_COLORS.forEach(c => colorCounts[c] = 0);
      rows.forEach(r => {
        const c = rowSeatColor(r);
        if (c && colorCounts.hasOwnProperty(c)) colorCounts[c]++;
      });

      const colorEl = document.getElementById("colorStats");
      colorEl.innerHTML = "";
      SEAT_COLORS.forEach(c => {
        const pill = document.createElement("div");
        pill.className = "pill";
        pill.innerHTML = `<div class="pLabel">${c}</div><div class="pValue">${colorCounts[c]}</div>`;
        colorEl.appendChild(pill);
      });

      const allianceCounts = {};
      rows.forEach(r => {
        const a = r.InterestedAlliance || "—";
        allianceCounts[a] = (allianceCounts[a] || 0) + 1;
      });

      const allianceEl = document.getElementById("allianceStats");
      allianceEl.innerHTML = "";
      Object.keys(allianceCounts).sort().forEach(a => {
        const pill = document.createElement("div");
        pill.className = "pill";
        pill.innerHTML = `<div class="pLabel">${a}</div><div class="pValue">${allianceCounts[a]}</div>`;
        allianceEl.appendChild(pill);
      });
    }

    function renderTable(rows){
      const thead = document.getElementById("resultsThead");
      const tbody = document.getElementById("resultsTbody");
      thead.innerHTML = "";
      tbody.innerHTML = "";
      if (!visibleColumns.length) return;

      const trh = document.createElement("tr");
      visibleColumns.forEach(col => {
        const th = document.createElement("th");
        th.onclick = () => toggleSort(col);
        th.textContent = col;
        if (sortState.column === col) {
          const arrow = document.createElement("span");
          arrow.className = "sortArrow";
          arrow.textContent = sortState.dir === 1 ? "\u25B2" : "\u25BC";
          th.appendChild(arrow);
        }
        trh.appendChild(th);
      });
      thead.appendChild(trh);

      rows.forEach(row => {
        const tr = document.createElement("tr");
        visibleColumns.forEach(col => {
          const td = document.createElement("td");
          td.textContent = formatCell(col, row[col]);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function exportCsv(){
      const rows = getFilteredRows();
      if (!rows.length) return showMsg("resultsMsg", "Nothing to export.");

      const escapeCsv = (v) => {
        const s = String(v ?? "");
        return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      };

      const lines = [visibleColumns.map(escapeCsv).join(",")];
      rows.forEach(row => {
        lines.push(visibleColumns.map(col => escapeCsv(formatCell(col, row[col]))).join(","));
      });

      const csv = lines.join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `776-transfer-results-${new Date().toISOString().slice(0,10)}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    (function init(){
      const session = getSession();
      if (session) showResultsSection();
    })();
  </script>
</body>
</html>
